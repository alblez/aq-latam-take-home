name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "11"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm quality
        working-directory: frontend

  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "11"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: pnpm --package=@redocly/cli dlx redocly lint --config .redocly.yaml shared/contract.yaml

  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: extractions/setup-just@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz \
            | sudo tar xz -C /usr/local/bin/ gitleaks
      - run: uv sync --frozen
        working-directory: backend
      - name: Backend quality
        run: just backend-quality
      - name: Contract drift check
        run: just backend-contract-drift
      - name: Security audit (pip-audit + gitleaks)
        run: just backend-security
      - name: Coverage
        run: just backend-coverage

  backend-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: ai_interviewer_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen
        working-directory: backend
      - name: DB lint (sqlfluff)
        run: just backend-db-lint
      - name: Alembic migrate (real Postgres)
        run: uv run alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ai_interviewer_test
      - name: Seed validation
        run: uv run python scripts/seed.py
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ai_interviewer_test
      - name: DB smoke (offline checks)
        run: just backend-db-smoke

  preflight:
    needs: [frontend-quality, contract-check, backend-quality, backend-db]
    runs-on: ubuntu-latest
    steps:
      - run: echo "preflight aggregate passed"
